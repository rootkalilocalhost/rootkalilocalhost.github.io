<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Legit Mini App</title>
    <style>
        body { font-family: system-ui; padding: 20px; text-align: center; }
        .card { background: #f5f5f5; padding: 20px; border-radius: 12px; margin-top: 20px; }
        button { background: #0088cc; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎁 Welcome to Legit App!</h1>
    <p>You are logged in as <span id="username">Loading...</span></p>
    <div class="card">
        <p>🔥 You have 0 points</p>
        <button id="claimBtn">Claim Daily Reward</button>
    </div>

    <script>
        // ТВОЙ CODESPACE URL (ЗАМЕНИ НА СВОЙ)
        const BACKEND_URL = "https://sturdy-umbrella-g4qxgpv5v4xw3v67w-8080.preview.app.github.dev";
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const user = tg.initDataUnsafe.user || { first_name: 'Anonymous', id: 0 };
        document.getElementById('username').innerText = user.first_name;
        
        const initData = tg.initData;
        const userData = JSON.stringify(user);
        
        console.log("Sending initData to backend...");
        
        // ОТПРАВЛЯЕМ initData НА БЭКЕНД
        fetch(`${BACKEND_URL}/api/init`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Init-Data': initData,
                'X-User-Data': userData
            }
        })
        .then(res => res.json())
        .then(data => {
            console.log('Success:', data);
            document.getElementById('username').innerHTML = `${user.first_name} (data sent)`;
        })
        .catch(err => {
            console.error('Error:', err);
            document.getElementById('username').innerHTML = `${user.first_name} (error: ${err.message})`;
        });
        
        document.getElementById('claimBtn').addEventListener('click', () => {
            alert("+10 points claimed!");
        });
    </script>
</body>
</html>
