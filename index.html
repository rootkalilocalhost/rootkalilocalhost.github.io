<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Loading...</h1>
    <script>
        // 
        const BACKEND = "https://sturdy-umbrella-g4qxgpv5v4xw3v67w-5000.app.github.dev/";
        
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        fetch(BACKEND + "/api/init", {
            method: "POST",
            headers: {
                "X-Init-Data": tg.initData,
                "X-User-Data": JSON.stringify(tg.initDataUnsafe.user)
            }
        });
        
        document.body.innerHTML = "<h1>App loaded</h1><p>Welcome!</p>";
    </script>
</body>
</html>
